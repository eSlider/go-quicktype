<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="light dark" />
        <base href="/go-quicktype/" />
        <meta
            name="description"
            content="Generate typed models from JSON, Schema, TypeScript, and GraphQL — entirely in your browser."
        />
        <title>go-quicktype</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>{}</text></svg>"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/vuetify@3.7.6/dist/vuetify.min.css"
        />
        <style>
            html,
            body,
            #app {
                height: 100%;
            }

            body {
                margin: 0;
            }

            .editor-main {
                height: calc(100vh - 64px);
                min-height: 0;
            }

            .editor-shell,
            .editor-grid,
            .editor-col {
                height: 100%;
                min-height: 0;
            }

            .editor-grid {
                flex: 1 1 auto;
            }

            .editor-col {
                display: flex;
                flex-direction: column;
                min-height: 320px;
            }

            .editor-card {
                display: flex;
                flex: 1 1 auto;
                flex-direction: column;
                min-height: 0;
                overflow: hidden;
            }

            .editor-pane {
                flex: 1 1 auto;
                min-height: 0;
                overflow: hidden;
            }

            .code-editor-host,
            .code-editor-host .cm-editor {
                height: 100%;
            }

            @media (min-width: 960px) {
                .editor-col {
                    min-height: 0;
                }
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/vuetify@3.7.6/dist/vuetify.min.js"></script>
        <script type="module" src="app.js"></script>
    </body>
</html>
